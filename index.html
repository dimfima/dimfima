<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>СУКА</title>

<link rel="icon" type="image/png" href="https://i.pinimg.com/736x/c0/63/32/c06332b424e199f80eca0dea00210e01.jpg">

<style>
html,body{
margin:0;
padding:0;
background:#050505;
overflow:hidden;
font-family:monospace;
color:#fff;
cursor: none;
}

a, a:hover, a:active, a:visited, button, img, div, span, [onclick] {
cursor: none !important;
}

canvas{
position:fixed;
top:0;
left:0;
}

#ascii{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:10px;
line-height:10px;
white-space:pre;
text-align:center;
filter:drop-shadow(0 0 12px #aaa);
pointer-events: none;
z-index: 10;
}

#floating{
position:absolute;
top:22%;
width:100%;
text-align:center;
font-size:14px;
opacity:0.5;
z-index: 10;
}

#title{
position:absolute;
top:10px;
width:100%;
text-align:center;
opacity:0.7;
z-index: 10;
}

.links-bar {
position: absolute;
bottom: 20px;
left: 0;
right: 0;
display: flex;
justify-content: center;
gap: 20px;
flex-wrap: wrap;
padding: 15px;
z-index: 100;
}

.links-bar a {
display: inline-flex;
align-items: center;
gap: 8px;
color: rgba(255,255,255,0.8);
text-decoration: none;
font-size: 14px;
font-family: monospace;
transition: 0.3s;
padding: 8px 15px;
border-radius: 30px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(5px);
}

.links-bar a:hover {
background: rgba(255,255,255,0.2);
transform: scale(1.1);
}

.links-bar img {
width: 32px;
height: 32px;
border-radius: 50%;
object-fit: cover;
}

.cursor{
position:fixed;
width:22px;
height:22px;
border-radius:50%;
pointer-events:none;
background:radial-gradient(circle, rgba(255,255,255,0.6), rgba(200,200,200,0.3), transparent);
mix-blend-mode:difference;
z-index: 9999;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="title">СУКА</div>
<div id="floating"></div>
<div id="ascii"></div>

<div class="links-bar">
    <a href="https://share.podso.su/stream/lksfnd" target="_blank">
        <img src="https://i.pinimg.com/736x/02/7c/9b/027c9b517fb3e8f0c4780b56b9146fbc.jpg">
        <span>🚫 18+</span>
    </a>
    
    <a href="https://soundcloud.com/dimfima" target="_blank">
        <img src="https://i.pinimg.com/736x/23/a4/e0/23a4e0663943e95c68effb4d202ddbb9.jpg">
        <span>🎶 SOUNDCLOUD</span>
    </a>
    
    <a href="https://t.me/dimfimalox" target="_blank">
        <img src="https://i.pinimg.com/736x/b4/41/7e/b4417e4fbfff2e229152c5f8ebcfed03.jpg">
        <span>💬 TELEGRAM</span>
    </a>
</div>

<div class="cursor" id="cursor"></div>

<script>
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

// Частицы фона
let particles=[];
for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1.5,
vy:(Math.random()-0.5)*1.5
});
}

function bg(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.fillStyle="white";
ctx.fillRect(p.x,p.y,2,2);

particles.forEach(p2=>{
let dx=p.x-p2.x;
let dy=p.y-p2.y;
let dist=Math.sqrt(dx*dx+dy*dy);
if(dist<100){
ctx.strokeStyle="rgba(255,255,255,0.05)";
ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(p2.x,p2.y);
ctx.stroke();
}
});
});

requestAnimationFrame(bg);
}
bg();

// ========== ТЕКСТЫ ДЛЯ СМЕНЫ ==========
const textList = [
    "DIMFIMA",
    "SPT <3",
    "NIGGA",
    "SOCIALIZE",
    "WHO AM I?"
];

let currentTextIndex = 0;
let currentText = textList[0];
// =======================================

const density = 5; // Меньше = больше частиц, больше = меньше частиц
let textParts = []; // Частицы для текста
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*+=?/\\|[]{}()";

// Получить позиции символов текста
function getTextPositions(text, canvasWidth, canvasHeight) {
    let off = document.createElement("canvas");
    let octx = off.getContext("2d");
    off.width = 800;
    off.height = 200;
    
    octx.fillStyle = "#fff";
    octx.font = "bold 140px monospace";
    octx.textAlign = "center";
    octx.fillText(text, 400, 140);
    
    let data = octx.getImageData(0, 0, 800, 200).data;
    let positions = [];
    
    for(let y = 0; y < 200; y += density){
        for(let x = 0; x < 800; x += density){
            let i = (y * 800 + x) * 4;
            if(data[i] > 128){
                positions.push({
                    tx: x + canvasWidth/2 - 400,
                    ty: y + canvasHeight/2 - 100
                });
            }
        }
    }
    return positions;
}

// Создать или обновить частицы текста
function updateText(newText) {
    let positions = getTextPositions(newText, canvas.width, canvas.height);
    
    if(textParts.length === 0) {
        // Первое создание
        for(let i = 0; i < positions.length; i++){
            textParts.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                tx: positions[i].tx,
                ty: positions[i].ty,
                currentChar: chars[Math.floor(Math.random() * chars.length)],
                charTimer: Math.random() * 50 // Рандомный таймер для смены символа
            });
        }
    } else {
        // Обновление существующих частиц
        // Обновляем target позиции
        for(let i = 0; i < textParts.length && i < positions.length; i++) {
            textParts[i].tx = positions[i].tx;
            textParts[i].ty = positions[i].ty;
        }
        
        // Добавляем новые частицы если нужно
        if(positions.length > textParts.length) {
            for(let i = textParts.length; i < positions.length; i++) {
                textParts.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    tx: positions[i].tx,
                    ty: positions[i].ty,
                    currentChar: chars[Math.floor(Math.random() * chars.length)],
                    charTimer: Math.random() * 50
                });
            }
        }
        // Удаляем лишние частицы
        else if(positions.length < textParts.length) {
            textParts = textParts.slice(0, positions.length);
        }
    }
}

// Функция смены текста с анимацией
function changeText() {
    currentTextIndex = (currentTextIndex + 1) % textList.length;
    currentText = textList[currentTextIndex];
    updateText(currentText);
}

// Анимация текста
function animateText() {
    if(textParts.length === 0) return;
    
    textParts.forEach(p => {
        // Движение к цели (увеличил скорость с 0.06 до 0.12)
        p.x += (p.tx - p.x) * 0.12;
        p.y += (p.ty - p.y) * 0.12;
        
        // Частая смена символов для мерцания (увеличил частоту)
        if(Math.random() < 0.15) {
            p.currentChar = chars[Math.floor(Math.random() * chars.length)];
        }
        
        ctx.fillStyle = "white";
        ctx.font = "11px monospace";
        ctx.fillText(p.currentChar, p.x, p.y);
    });
    
    requestAnimationFrame(animateText);
}

// Инициализация
updateText(currentText);
animateText();

// Смена текста каждые 4 секунды
setInterval(() => {
    changeText();
}, 4000);

// Курсор
const cursor=document.getElementById("cursor");
let mx=0,my=0,cx=0,cy=0;

document.addEventListener("mousemove",e=>{
mx=e.clientX;
my=e.clientY;
});

function cursorAnim(){
cx+=(mx-cx)*0.2;
cy+=(my-cy)*0.2;

cursor.style.left=cx+"px";
cursor.style.top=cy+"px";

requestAnimationFrame(cursorAnim);
}
cursorAnim();

// Плавающие фразы
const phrases=[
"ты намаслил свою штуку дрюку?",
"fuck snickers",
"нахуй социализацию, SP Tarkov лучше",
"я тебе сейчас голова глаза сделаю",
"ГАНДОН ТЫ ЕБУЧИЙ!",
"свободного интренета не быть.",
"смерть в нищите - Approved ☑"
];

let p=0;
setInterval(()=>{
p=(p+1)%phrases.length;
document.getElementById("floating").textContent=phrases[p];
},2500);

// Мигающий тайтл
const faces=["пошел","нахуй"];
let f=0;
setInterval(()=>{
f=(f+1)%faces.length;
document.title=faces[f];
document.getElementById("title").textContent=faces[f];
},2000);

// Ресайз окна
window.onresize=()=>{
canvas.width=innerWidth;
canvas.height=innerHeight;
updateText(currentText);
};
</script>

</body>
</html>
