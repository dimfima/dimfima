<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

*{

  margin:0;
  padding:0;
  -webkit-user-select:none;
  -moz-user-select:none;
  -ms-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

img, a, div, span, button, p, h1, h2, h3, h4, h5, h6 {

  -moz-user-select:none;
  -ms-user-select:none;

html,body{

}

html, body, html * {

#main-content {

.links-bar a:hover{

}

}

}

}
#enter-btn{

}
#enter-btn:hover{

  border-color:rgba(255,40,40,0.6);

}

/* ── LOW DETAIL MODE TOGGLE ── */

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
#low-detail-label{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  letter-spacing:2px;
  color:rgba(255,255,255,0.5);
  text-transform:uppercase;
}
#low-detail-btn{
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
  letter-spacing:3px;

  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.15);

}
#low-detail-btn:hover{

#low-detail-btn.active{

  box-shadow:0 0 10px rgba(255,200,50,0.2);
}

/* ── ПЛЕЕР ── */
#player{

  right:28px;
  top:50%;

  flex-direction:column;

  gap:10px;

}

#progress-fill{

  background:rgba(255,255,255,0.5);
  border-radius:1px;
  transition:width 0.3s linear;
}
#progress-time{
  font-size:7px;
  letter-spacing:1px;
  opacity:0.35;
  text-align:center;
  min-width:50px;

#play-btn{
  width:36px;height:36px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.18);
  color:#fff;

  outline:none;
}
#play-btn:hover{

  border-color:rgba(255,60,60,0.5);

}

#vol-fill{

.cursor{

  50%{opacity:0.8;}

</style>
</head>

const splash = document.getElementById("splash");

const audio = document.getElementById("audio");
const iconPlay = document.getElementById("icon-play");
const iconPause = document.getElementById("icon-pause");
const cursor = document.getElementById("cursor");

let playing = false;
let fadeInterval = null;
const FADE_DURATION = 800;
const FADE_STEPS = 40;

function sliderToReal(v) { return Math.pow(v, 2.5); }

function stopFade() {
  if (fadeInterval) {
    clearInterval(fadeInterval);
    fadeInterval = null;
  }
}

function fadeIn(targetVolume) {
  stopFade();
  let currentVol = audio.volume;
  let targetVol = sliderToReal(targetVolume);
  let step = (targetVol - currentVol) / FADE_STEPS;
  let stepTime = FADE_DURATION / FADE_STEPS;
  let steps = 0;

  fadeInterval = setInterval(() => {
    steps++;
    audio.volume = Math.min(currentVol + step * steps, targetVol);
    if (steps >= FADE_STEPS) {
      audio.volume = targetVol;
      stopFade();
    }
  }, stepTime);
}

function fadeOut(callback) {
  stopFade();
  let currentVol = audio.volume;
  let step = currentVol / FADE_STEPS;
  let stepTime = FADE_DURATION / FADE_STEPS;
  let steps = 0;

  fadeInterval = setInterval(() => {
    steps++;
    audio.volume = Math.max(currentVol - step * steps, 0);
    if (steps >= FADE_STEPS) {
      audio.volume = 0;
      stopFade();
      if (callback) callback();
    }
  }, stepTime);
}

  currentTrackIndex = index;
  const track = playlist[index];
  audio.src = track.src;
  document.getElementById("track-cover").src = track.cover;
  document.getElementById("track-name").textContent = track.name;
  document.getElementById("track-artist").textContent = track.artist;
  document.getElementById("progress-fill").style.width = "0%";
  document.getElementById("progress-time").textContent = "0:00 / 0:00";
}

function nextTrack() {
  stopFade();
  let newIndex = (currentTrackIndex + 1) % playlist.length;
  loadTrack(newIndex);
  if (playing) {
    audio.play().then(() => {
      fadeIn(volume);

}

function prevTrack() {

  loadTrack(newIndex);
  if (playing) {
    audio.play().then(() => {

}

loadTrack(currentTrackIndex);

canvas.width = innerWidth;

/* ══ ЧАСТИЦЫ ══ */
let particles = [];
function spawnParticles() {
  particles = [];
  let count = lowDetailMode ? 60 : 150;
  for (let i = 0; i < count; i++)
    particles.push({
      x: Math.random() * canvas.width,

  "rgba(255,220,0,1)",
  "rgba(180,0,255,1)",

];

function getTextPositions(text) {
  let off = document.createElement("canvas");
  off.width = 800;
  off.height = 200;
  let oc = off.getContext("2d");
  oc.fillStyle = "#fff";
  oc.font = "bold 140px monospace";
  oc.textAlign = "center";
  oc.fillText(text, 400, 140);
  let data = oc.getImageData(0, 0, 800, 200).data;
  let pos = [];
  let d = lowDetailMode ? 8 : 5;
  for (let y = 0; y < 200; y += d)
    for (let x = 0; x < 800; x += d) {
      let i = (y * 800 + x) * 4;
      if (data[i] > 128) pos.push({ tx: x + canvas.width / 2 - 400, ty: y + canvas.height / 2 - 100 });
    }
  return pos;
}

function updateText(text) {
  let pos = getTextPositions(text);
  if (!textParts.length) {
    textParts = pos.map(p => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      tx: p.tx,
      ty: p.ty,
      ch: chars[Math.floor(Math.random() * chars.length)],

      glitchCol: null,
      glitchColTimer: 0,
      shiftX: 0,
      shiftY: 0,
      shiftTimer: 0

  } else {

    for (let i = 0; i < n; i++) { textParts[i].tx = pos[i].tx; textParts[i].ty = pos[i].ty; }
    if (pos.length > textParts.length)
      for (let i = textParts.length; i < pos.length; i++)
        textParts.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          tx: pos[i].tx,
          ty: pos[i].ty,
          ch: chars[Math.floor(Math.random() * chars.length)],

          glitchCol: null,
          glitchColTimer: 0,
          shiftX: 0,
          shiftY: 0,
          shiftTimer: 0

  }

let blockShiftActive = false;

function triggerGlitch() {
  if (lowDetailMode && Math.random() < 0.5) return;
  
  glitchActive = true;
  glitchTimer = 10 + Math.floor(Math.random() * 22);
  noiseLevel = 0.06 + Math.random() * 0.14;
  rgbAmount = lowDetailMode ? 0 : (4 + Math.random() * 16);

  glitchLines = [];
  let n = lowDetailMode ? 2 : (4 + Math.floor(Math.random() * 12));
  for (let i = 0; i < n; i++)
    glitchLines.push({
      y: Math.random() * canvas.height,
      h: Math.random() < 0.6 ? (1 + Math.random() * 8) : (12 + Math.random() * 50),
      dx: (Math.random() - .5) * 120,
      tinted: Math.random() < 0.35
    });

  if (!lowDetailMode) {
    textParts.forEach(p => {
      if (Math.random() < 0.55) {
        p.glitchCol = glitchPalette[Math.floor(Math.random() * glitchPalette.length)];
        p.glitchColTimer = glitchTimer + Math.floor(Math.random() * 10);
      }
      if (Math.random() < 0.12) {
        p.shiftX = (Math.random() - .5) * 30;
        p.shiftY = (Math.random() - .5) * 10;
        p.shiftTimer = 3 + Math.floor(Math.random() * 8);
      }
    });
  }

  if (Math.random() < 0.5) {
    blockShiftActive = true;
    blockShiftX = (Math.random() - .5) * 60;
    blockShiftY = (Math.random() - .5) * 20;
    blockShiftTimer = 4 + Math.floor(Math.random() * 10);
  }
}

function scheduleGlitch() {
  let delay = lowDetailMode ? (1500 + Math.random() * 3000) : (500 + Math.random() * 2200);
  setTimeout(() => { triggerGlitch(); scheduleGlitch(); }, delay);
}
scheduleGlitch();

/* ══ ГЛАВНЫЙ ЦИКЛ ══ */
function draw() {
  ctx.fillStyle = "rgba(5,5,5,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    ctx.fillStyle = (glitchActive && Math.random() < 0.07)
      ? (Math.random() < 0.5 ? "rgba(255,30,80,0.9)" : "rgba(30,255,180,0.9)")
      : `rgba(255,255,255,${0.4 + p.bright * 0.5})`;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  });

  if (glitchActive) {
    let cnt = Math.floor(canvas.width * canvas.height * noiseLevel * 0.0012);
    for (let i = 0; i < cnt; i++) {
      let nx = Math.random() * canvas.width, ny = Math.random() * canvas.height;
      let r = Math.random();
      ctx.fillStyle = r < 0.5 ? `rgba(255,255,255,${Math.random() * 0.8})`
        : r < 0.75 ? `rgba(255,0,80,${Math.random() * 0.65})` : `rgba(0,255,190,${Math.random() * 0.65})`;
      ctx.fillRect(nx, ny, Math.random() < 0.2 ? Math.random() * 5 : 1, Math.random() < 0.08 ? Math.random() * 10 : 1);
    }

    glitchLines.forEach(l => {
      let sy = Math.max(0, Math.floor(l.y)), sh = Math.min(Math.ceil(l.h), canvas.height - sy);
      if (sh < 1) return;
      try {
        let imgD = ctx.getImageData(0, sy, canvas.width, sh);
        ctx.putImageData(imgD, l.dx, sy);
        if (l.tinted) {
          ctx.fillStyle = Math.random() < 0.5 ? "rgba(255,0,80,0.1)" : "rgba(0,255,180,0.08)";
          ctx.fillRect(0, sy, canvas.width, sh);
        }
      } catch (e) {}
    });

    if (Math.random() < 0.45) {
      let lx = Math.random() * canvas.width;
      ctx.fillStyle = Math.random() < 0.5 ? "rgba(255,0,80,0.45)" : "rgba(0,255,180,0.4)";
      ctx.fillRect(lx, 0, Math.random() < 0.7 ? 1 : Math.random() * 3, canvas.height);
    }

    if (rgbAmount > 0) {
      try {
        let iw = canvas.width, ih = canvas.height;
        let src = ctx.getImageData(0, 0, iw, ih);
        let dst = ctx.createImageData(iw, ih);
        let sd = src.data, dd = dst.data;
        let shift = Math.round(rgbAmount);
        for (let y = 0; y < ih; y++) {
          for (let x = 0; x < iw; x++) {
            let di = (y * iw + x) * 4;
            let rx = Math.min(iw - 1, x + shift);
            let ri = (y * iw + rx) * 4;
            dd[di] = sd[ri];
            dd[di + 1] = sd[(y * iw + x) * 4 + 1];
            let bx = Math.max(0, x - shift);
            let bi = (y * iw + bx) * 4;
            dd[di + 2] = sd[bi + 2];
            dd[di + 3] = sd[(y * iw + x) * 4 + 3];
          }
        }
        ctx.putImageData(dst, 0, 0);
      } catch (e) {}
    }

    glitchTimer--;
    if (glitchTimer <= 0) {
      glitchActive = false;
      rgbAmount = 0;
      noiseLevel = 0;
      glitchLines = [];
    }
  }

  if (blockShiftActive) {
    blockShiftTimer--;
    if (blockShiftTimer <= 0) {
      blockShiftActive = false;
      blockShiftX = 0;
      blockShiftY = 0;
    }
  }

  ctx.font = "11px 'Share Tech Mono',monospace";
  textParts.forEach(p => {
    p.x += (p.tx - p.x) * 0.12;
    p.y += (p.ty - p.y) * 0.12;
    if (Math.random() < 0.14) p.ch = chars[Math.floor(Math.random() * chars.length)];

    if (p.glitchColTimer > 0) {
      p.glitchColTimer--;
      if (Math.random() < 0.2)
        p.glitchCol = glitchPalette[Math.floor(Math.random() * glitchPalette.length)];
      if (p.glitchColTimer <= 0) p.glitchCol = null;
    }

    if (p.shiftTimer > 0) {
      p.shiftTimer--;
      if (p.shiftTimer <= 0) { p.shiftX = 0; p.shiftY = 0; }
    }

    let drawX = p.x + p.shiftX + (blockShiftActive ? blockShiftX : 0);
    let drawY = p.y + p.shiftY + (blockShiftActive ? blockShiftY : 0);

    ctx.fillStyle = p.glitchCol ? p.glitchCol : "rgba(255,255,255,0.92)";
    ctx.fillText(p.ch, drawX, drawY);

    if (!lowDetailMode && p.glitchCol && Math.random() < 0.3) {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = glitchPalette[Math.floor(Math.random() * glitchPalette.length)];
      ctx.fillText(p.ch, drawX + (Math.random() - .5) * 6, drawY + (Math.random() - .5) * 4);
      ctx.globalAlpha = 1;
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* ══ АУДИО ══ */
const playBtn = document.getElementById("play-btn");
const volTrack = document.getElementById("vol-track");
const volFill = document.getElementById("vol-fill");
const volThumb = document.getElementById("vol-thumb");
const volPct = document.getElementById("vol-pct");
const progressFill = document.getElementById("progress-fill");
const progressTime = document.getElementById("progress-time");

let volume = 0.20, dragging = false;
audio.volume = 0;

function formatTime(seconds) {
  let mins = Math.floor(seconds / 60);
  let secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function updateProgress() {
  if (audio.duration) {
    let pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + "%";
    progressTime.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
  }
}

audio.addEventListener("timeupdate", updateProgress);
audio.addEventListener("loadedmetadata", updateProgress);

function setVolumeUI(v) {
  let pct = Math.round(v * 100);
  let trackH = volTrack.offsetHeight;
  let fillH = trackH * v;
  volFill.style.height = fillH + "px";
  volThumb.style.bottom = (fillH - 2.5) + "px";
  volPct.textContent = pct + "%";
}

setVolumeUI(volume);

playBtn.addEventListener("click", () => {
  if (playing) {
    iconPlay.style.display = "block";
    iconPause.style.display = "none";
    playing = false;
    fadeOut(() => {
      audio.pause();
    });
  } else {
    audio.volume = 0;
    audio.play().then(() => {
      iconPlay.style.display = "none";
      iconPause.style.display = "block";
      playing = true;
      fadeIn(volume);
    }).catch(() => {});
  }
});

document.getElementById("next-btn").addEventListener("click", nextTrack);
document.getElementById("prev-btn").addEventListener("click", prevTrack);

audio.addEventListener("ended", () => {
  nextTrack();
});

function volFromEvent(e) {
  let rect = volTrack.getBoundingClientRect();
  let cY = e.touches ? e.touches[0].clientY : e.clientY;
  let newVol = Math.max(0, Math.min(1, 1 - (cY - rect.top) / rect.height));
  volume = newVol;
  setVolumeUI(volume);
  if (!fadeInterval && playing) {
    audio.volume = sliderToReal(volume);
  }
}
volTrack.addEventListener("mousedown", e => { dragging = true; volFromEvent(e); });
volTrack.addEventListener("touchstart", e => { dragging = true; volFromEvent(e); }, { passive: true });
document.addEventListener("mousemove", e => { if (dragging) volFromEvent(e); });
document.addEventListener("touchmove", e => { if (dragging) volFromEvent(e); }, { passive: true });
document.addEventListener("mouseup", () => dragging = false);
document.addEventListener("touchend", () => dragging = false);

/* ══ КАСТОМНЫЙ КУРСОР ══ */
let mx = 0, my = 0, cx = 0, cy = 0;
document.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });
(function cursorAnim() {
  cx += (mx - cx) * 0.7;
  cy += (my - cy) * 0.7;
  cursor.style.left = (cx - 10) + "px";
  cursor.style.top = (cy - 10) + "px";
  requestAnimationFrame(cursorAnim);
})();

/* ══ ТАЙТЛ ══ */
const faces = ["FUCK OFF", "GO AWAY", "LEAVE", "DIE", "KYS", "SUFFER"];
let fi = 0;
setInterval(() => {
  fi = (fi + 1) % faces.length;
  document.title = faces[fi];
  document.getElementById("title").textContent = faces[fi];
}, 2000);

/* ══ РЕСАЙЗ ══ */
window.onresize = () => {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  spawnParticles();
  if (textInterval) clearInterval(textInterval);
  updateText(textList[tIdx]);
  textInterval = setInterval(() => { tIdx = (tIdx + 1) % textList.length; updateText(textList[tIdx]); }, 5000);
  setVolumeUI(volume);
};
</script>
