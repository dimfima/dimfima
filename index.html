<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>СУКА</title>
<link rel="icon" type="image/png" href="https://i.pinimg.com/736x/c0/63/32/c06332b424e199f80eca0dea00210e01.jpg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  background:#050505;
  overflow:hidden;
  font-family:'Share Tech Mono',monospace;
  color:#fff;
  cursor:none;
  width:100%;height:100%;
}

canvas{position:fixed;top:0;left:0;z-index:0;}

#scanlines{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 2px,
    rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px
  );
  pointer-events:none;z-index:5;
}

#title{
  position:absolute;
  top:12px;width:100%;
  text-align:center;
  font-size:13px;
  letter-spacing:4px;
  opacity:0.6;
  z-index:10;
  text-transform:uppercase;
}

#floating{
  position:absolute;
  top:22%;width:100%;
  text-align:center;
  font-size:13px;
  opacity:0.35;
  z-index:10;
  letter-spacing:2px;
}

.links-bar{
  position:absolute;
  bottom:20px;left:0;right:0;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  padding:15px;
  z-index:100;
}
.links-bar a{
  display:inline-flex;align-items:center;gap:8px;
  color:rgba(255,255,255,0.8);
  text-decoration:none;
  font-size:14px;
  font-family:'Share Tech Mono',monospace;
  padding:8px 15px;
  border-radius:30px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(5px);
  transition:0.3s;
  cursor:none;
}
.links-bar a:hover{
  background:rgba(255,255,255,0.2);
  transform:scale(1.1);
}
.links-bar img{
  width:32px;height:32px;
  border-radius:50%;
  object-fit:cover;
}

/* ── ПЛЕЕР ── */
#player{
  position:absolute;
  right:28px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  z-index:100;
}

#play-btn{
  width:40px;height:40px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.18);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:none;
  transition:.2s;
  user-select:none;
  backdrop-filter:blur(4px);
  flex-shrink:0;
}
#play-btn:hover{
  background:rgba(255,60,60,0.18);
  border-color:rgba(255,60,60,0.5);
  box-shadow:0 0 16px rgba(255,40,40,0.3);
}
/* SVG иконки одинакового размера */
#play-btn svg{
  width:14px;height:14px;
  display:block;
  flex-shrink:0;
}

/* ── ШКАЛА ГРОМКОСТИ ── */
#vol-wrap{
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
#vol-label{
  font-size:8px;letter-spacing:3px;opacity:0.35;text-transform:uppercase;
}
#vol-track{
  width:4px;height:130px;
  background:rgba(255,255,255,0.07);
  border-radius:4px;position:relative;cursor:none;
  border:1px solid rgba(255,255,255,0.07);
}
#vol-fill{
  position:absolute;bottom:0;left:0;right:0;border-radius:4px;
  background:linear-gradient(to top,rgba(255,30,30,1),rgba(255,140,0,0.85),rgba(255,255,80,0.7),rgba(200,255,200,0.5));
  box-shadow:0 0 10px rgba(255,60,60,0.6);
  transition:height .06s;
}
#vol-thumb{
  position:absolute;left:50%;transform:translate(-50%,50%);
  width:14px;height:5px;background:#fff;border-radius:3px;
  box-shadow:0 0 10px rgba(255,255,255,0.9),0 0 3px #f44;
  cursor:none;
}
#vol-pct{font-size:9px;letter-spacing:1px;opacity:0.3;}

.cursor{
  position:fixed;width:20px;height:20px;border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle,rgba(255,60,60,0.65),rgba(200,200,200,0.15),transparent);
  mix-blend-mode:difference;z-index:9999;
}

/* ── ИНФО О ТРЕКЕ ── */
#track-info{
  position:absolute;
  right:28px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  z-index:100;
}

#track-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

#track-cover{
  width:46px;height:46px;
  border-radius:4px;
  object-fit:cover;
  border:1px solid rgba(255,255,255,0.12);
  filter:grayscale(20%);
  box-shadow:0 0 12px rgba(0,0,0,0.6);
}

#track-name{
  font-size:8px;
  letter-spacing:1.5px;
  opacity:0.5;
  text-align:center;
  max-width:70px;
  line-height:1.4;
  text-transform:uppercase;
  word-break:break-word;
}

#track-artist{
  font-size:7px;
  letter-spacing:1px;
  opacity:0.3;
  text-align:center;
  text-transform:uppercase;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="scanlines"></div>

<div id="title">DIMFIMA</div>
<div id="floating"></div>

<audio id="audio" loop preload="auto">
  <source src="https://dl.dropboxusercontent.com/scl/fi/mgrvkw0ef4fdy77ixycqt/c6540ea2-0758-4482-becd-bd2207de862a_Sewerslvt-sick-twisted.mp3?rlkey=81209ndiu47vw7pk4lobiw7n7" type="audio/mpeg">
</audio>

<div id="player">
  <!-- Обложка и название трека — замени src и текст на свои -->
  <div id="track-card">
    <img id="track-cover" src="https://i.pinimg.com/1200x/77/c8/9b/77c89b21841e213f421d9eaf5db69472.jpg" alt="cover">
    <div id="track-name">sick, twisted, demented</div>
    <div id="track-artist">Sewerslvt</div>
  </div>
  <div id="vol-wrap">
    <div id="vol-label">VOL</div>
    <div id="vol-track">
      <div id="vol-fill"></div>
      <div id="vol-thumb"></div>
    </div>
    <div id="vol-pct">20%</div>
  </div>
  <div id="play-btn">
    <!-- play icon (default) -->
    <svg id="icon-play" viewBox="0 0 14 14" fill="white" xmlns="http://www.w3.org/2000/svg">
      <polygon points="2,1 13,7 2,13"/>
    </svg>
    <!-- pause icon (hidden) -->
    <svg id="icon-pause" viewBox="0 0 14 14" fill="white" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <rect x="2" y="1" width="3.5" height="12" rx="1"/>
      <rect x="8.5" y="1" width="3.5" height="12" rx="1"/>
    </svg>
  </div>
</div>

<div class="links-bar">
  <a href="https://steamcommunity.com/id/DimFima/" target="_blank">
    <img src="https://i.pinimg.com/1200x/9e/cd/89/9ecd89bcc35fe3666ca1c61e8b58814a.jpg">
    <span>STEAM PROFILE</span>
  </a>
</div>

<div class="cursor" id="cursor"></div>

<script>
/* ══ CANVAS ══ */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let offC=document.createElement("canvas");
offC.width=canvas.width;offC.height=canvas.height;
let offCtx=offC.getContext("2d");

/* ══ ЧАСТИЦЫ ══ */
let particles=[];
function spawnParticles(){
  particles=[];
  for(let i=0;i<200;i++)
    particles.push({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height,
      vx:(Math.random()-.5)*1.4,vy:(Math.random()-.5)*1.4,
      size:Math.random()<0.12?3:1,bright:Math.random()
    });
}
spawnParticles();

/* ══ ТЕКСТОВЫЕ ЧАСТИЦЫ ══ */
const density=5;
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*+=?/\\|[]{}()<>!~^";
const textList=["DIMFIMA","BREAKCORE","SEWERSLVT","NUH UH","HELLO?"];
let tIdx=0;
let textParts=[];

// Палитра глитч-цветов для символов
const glitchPalette=[
  "rgba(255,30,80,1)",
  "rgba(0,255,180,1)",
  "rgba(255,220,0,1)",
  "rgba(180,0,255,1)",
  "rgba(0,180,255,1)",
  "rgba(255,255,255,1)"
];

function getTextPositions(text){
  let off=document.createElement("canvas");
  off.width=800;off.height=200;
  let oc=off.getContext("2d");
  oc.fillStyle="#fff";
  oc.font="bold 140px monospace";
  oc.textAlign="center";
  oc.fillText(text,400,140);
  let data=oc.getImageData(0,0,800,200).data;
  let pos=[];
  for(let y=0;y<200;y+=density)
    for(let x=0;x<800;x+=density){
      let i=(y*800+x)*4;
      if(data[i]>128) pos.push({tx:x+canvas.width/2-400,ty:y+canvas.height/2-100});
    }
  return pos;
}

function updateText(text){
  let pos=getTextPositions(text);
  if(!textParts.length){
    textParts=pos.map(p=>({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height,
      tx:p.tx,ty:p.ty,
      ch:chars[Math.floor(Math.random()*chars.length)],
      col:"rgba(255,255,255,0.92)",
      glitchCol:null,
      glitchColTimer:0,
      // сдвиг символа
      shiftX:0,shiftY:0,shiftTimer:0
    }));
  } else {
    let n=Math.min(textParts.length,pos.length);
    for(let i=0;i<n;i++){textParts[i].tx=pos[i].tx;textParts[i].ty=pos[i].ty;}
    if(pos.length>textParts.length)
      for(let i=textParts.length;i<pos.length;i++)
        textParts.push({
          x:Math.random()*canvas.width,y:Math.random()*canvas.height,
          tx:pos[i].tx,ty:pos[i].ty,
          ch:chars[Math.floor(Math.random()*chars.length)],
          col:"rgba(255,255,255,0.92)",
          glitchCol:null,glitchColTimer:0,
          shiftX:0,shiftY:0,shiftTimer:0
        });
    else textParts=textParts.slice(0,pos.length);
  }
}
updateText(textList[0]);
setInterval(()=>{tIdx=(tIdx+1)%textList.length;updateText(textList[tIdx]);},4000);

/* ══ ГЛИТЧ СОСТОЯНИЕ ══ */
let glitchActive=false;
let glitchTimer=0;
let glitchLines=[];
let noiseLevel=0;
let rgbAmount=0;

// Глитч-сдвиг ВСЕГО текстового блока (имитация сбоя монитора)
let blockShiftX=0,blockShiftY=0,blockShiftTimer=0;
let blockShiftActive=false;

function triggerGlitch(){
  glitchActive=true;
  glitchTimer=10+Math.floor(Math.random()*22);
  noiseLevel=0.06+Math.random()*0.14;
  rgbAmount=4+Math.random()*16;

  glitchLines=[];
  let n=4+Math.floor(Math.random()*12);
  for(let i=0;i<n;i++)
    glitchLines.push({
      y:Math.random()*canvas.height,
      h:Math.random()<0.6?(1+Math.random()*8):(12+Math.random()*50),
      dx:(Math.random()-.5)*120,
      tinted:Math.random()<0.35
    });

  // Раскрашиваем символы текста в разные цвета группами
  // Делаем несколько "зон" цвета
  let zoneCount=2+Math.floor(Math.random()*4);
  textParts.forEach(p=>{
    if(Math.random()<0.55){
      // Этому символу достаётся глитч-цвет
      p.glitchCol=glitchPalette[Math.floor(Math.random()*glitchPalette.length)];
      p.glitchColTimer=glitchTimer+Math.floor(Math.random()*10);
    }
    // Иногда — сдвиг отдельного символа
    if(Math.random()<0.12){
      p.shiftX=(Math.random()-.5)*30;
      p.shiftY=(Math.random()-.5)*10;
      p.shiftTimer=3+Math.floor(Math.random()*8);
    }
  });

  // Глобальный сдвиг блока текста (монитор дал сбой)
  if(Math.random()<0.5){
    blockShiftActive=true;
    blockShiftX=(Math.random()-.5)*60;
    blockShiftY=(Math.random()-.5)*20;
    blockShiftTimer=4+Math.floor(Math.random()*10);
  }
}

function scheduleGlitch(){
  setTimeout(()=>{triggerGlitch();scheduleGlitch();},500+Math.random()*2200);
}
scheduleGlitch();

/* ══ ГЛАВНЫЙ ЦИКЛ ══ */
function draw(){
  ctx.fillStyle="rgba(5,5,5,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  /* Частицы */
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;
    ctx.fillStyle=(glitchActive&&Math.random()<0.07)
      ?(Math.random()<0.5?"rgba(255,30,80,0.9)":"rgba(30,255,180,0.9)")
      :`rgba(255,255,255,${0.4+p.bright*0.5})`;
    ctx.fillRect(p.x,p.y,p.size,p.size);
  });

  if(glitchActive){
    /* Шум */
    let cnt=Math.floor(canvas.width*canvas.height*noiseLevel*0.0012);
    for(let i=0;i<cnt;i++){
      let nx=Math.random()*canvas.width,ny=Math.random()*canvas.height;
      let r=Math.random();
      ctx.fillStyle=r<0.5?`rgba(255,255,255,${Math.random()*0.8})`
        :r<0.75?`rgba(255,0,80,${Math.random()*0.65})`:`rgba(0,255,190,${Math.random()*0.65})`;
      ctx.fillRect(nx,ny,Math.random()<0.2?Math.random()*5:1,Math.random()<0.08?Math.random()*10:1);
    }

    /* Горизонтальные полосы */
    glitchLines.forEach(l=>{
      let sy=Math.max(0,Math.floor(l.y)),sh=Math.min(Math.ceil(l.h),canvas.height-sy);
      if(sh<1)return;
      try{
        let imgD=ctx.getImageData(0,sy,canvas.width,sh);
        ctx.putImageData(imgD,l.dx,sy);
        if(l.tinted){
          ctx.fillStyle=Math.random()<0.5?"rgba(255,0,80,0.1)":"rgba(0,255,180,0.08)";
          ctx.fillRect(0,sy,canvas.width,sh);
        }
      }catch(e){}
    });

    /* Вертикальные полосы */
    if(Math.random()<0.45){
      let lx=Math.random()*canvas.width;
      ctx.fillStyle=Math.random()<0.5?"rgba(255,0,80,0.45)":"rgba(0,255,180,0.4)";
      ctx.fillRect(lx,0,Math.random()<0.7?1:Math.random()*3,canvas.height);
    }

    /* RGB хроматический сдвиг — только через пиксели, без screen blend */
    if(rgbAmount>0){
      try{
        let iw=canvas.width,ih=canvas.height;
        let src=ctx.getImageData(0,0,iw,ih);
        let dst=ctx.createImageData(iw,ih);
        let sd=src.data,dd=dst.data;
        let shift=Math.round(rgbAmount);
        for(let y=0;y<ih;y++){
          for(let x=0;x<iw;x++){
            let di=(y*iw+x)*4;
            // Red — берём из x+shift
            let rx=Math.min(iw-1,x+shift);
            let ri=(y*iw+rx)*4;
            dd[di]  =sd[ri];
            // Green — без сдвига
            dd[di+1]=sd[(y*iw+x)*4+1];
            // Blue — берём из x-shift
            let bx=Math.max(0,x-shift);
            let bi=(y*iw+bx)*4;
            dd[di+2]=sd[bi+2];
            dd[di+3]=sd[(y*iw+x)*4+3];
          }
        }
        ctx.putImageData(dst,0,0);
      }catch(e){}
    }

    glitchTimer--;
    if(glitchTimer<=0){
      glitchActive=false;
      rgbAmount=0;noiseLevel=0;glitchLines=[];
    }
  }

  /* Обновляем глобальный сдвиг блока */
  if(blockShiftActive){
    blockShiftTimer--;
    if(blockShiftTimer<=0){
      blockShiftActive=false;
      blockShiftX=0;blockShiftY=0;
    }
  }

  /* Текстовые частицы */
  ctx.font="11px 'Share Tech Mono',monospace";
  textParts.forEach(p=>{
    p.x+=(p.tx-p.x)*0.12;
    p.y+=(p.ty-p.y)*0.12;
    if(Math.random()<0.14) p.ch=chars[Math.floor(Math.random()*chars.length)];

    // Обновляем глитч-цвет символа
    if(p.glitchColTimer>0){
      p.glitchColTimer--;
      // Иногда дёргаем цвет между глитч-цветами
      if(Math.random()<0.2)
        p.glitchCol=glitchPalette[Math.floor(Math.random()*glitchPalette.length)];
      if(p.glitchColTimer<=0) p.glitchCol=null;
    }

    // Обновляем сдвиг символа
    if(p.shiftTimer>0){
      p.shiftTimer--;
      if(p.shiftTimer<=0){p.shiftX=0;p.shiftY=0;}
    }

    // Итоговая позиция с учётом сдвигов
    let drawX=p.x+p.shiftX+(blockShiftActive?blockShiftX:0);
    let drawY=p.y+p.shiftY+(blockShiftActive?blockShiftY:0);

    ctx.fillStyle=p.glitchCol?p.glitchCol:"rgba(255,255,255,0.92)";
    ctx.fillText(p.ch,drawX,drawY);

    // Если активен глитч-цвет — рисуем «эхо» символа со сдвигом для хроматики
    if(p.glitchCol&&Math.random()<0.3){
      ctx.globalAlpha=0.3;
      ctx.fillStyle=glitchPalette[Math.floor(Math.random()*glitchPalette.length)];
      ctx.fillText(p.ch,drawX+(Math.random()-.5)*6,drawY+(Math.random()-.5)*4);
      ctx.globalAlpha=1;
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* ══ АУДИО ══ */
const audio=document.getElementById("audio");
const playBtn=document.getElementById("play-btn");
const iconPlay=document.getElementById("icon-play");
const iconPause=document.getElementById("icon-pause");
const volTrack=document.getElementById("vol-track");
const volFill=document.getElementById("vol-fill");
const volThumb=document.getElementById("vol-thumb");
const volPct=document.getElementById("vol-pct");

let volume=0.20,playing=false,dragging=false;
audio.volume=volume;

// Кривая громкости: слайдер 0-1 → реальная громкость через квадрат
// При позиции 0.2 (20%) реальная громкость будет 0.2^2.5 ≈ 0.018 (очень тихо)
// При позиции 0.5 (50%) → ~0.18, при 1.0 → 1.0
function sliderToReal(v){ return Math.pow(v, 2.5); }
function realToSlider(v){ return Math.pow(v, 1/2.5); }

function setVolume(v){
  volume=Math.max(0,Math.min(1,v));
  audio.volume=sliderToReal(volume);
  let pct=Math.round(volume*100);
  let trackH=volTrack.offsetHeight;
  let fillH=trackH*volume;
  volFill.style.height=fillH+"px";
  volThumb.style.bottom=(fillH-2.5)+"px";
  volPct.textContent=pct+"%";
}
setVolume(volume);

playBtn.addEventListener("click",()=>{
  if(playing){
    audio.pause();
    iconPlay.style.display="block";
    iconPause.style.display="none";
    playing=false;
  } else {
    audio.play().catch(()=>{});
    iconPlay.style.display="none";
    iconPause.style.display="block";
    playing=true;
  }
});

function volFromEvent(e){
  let rect=volTrack.getBoundingClientRect();
  let cY=e.touches?e.touches[0].clientY:e.clientY;
  setVolume(1-(cY-rect.top)/rect.height);
}
volTrack.addEventListener("mousedown",e=>{dragging=true;volFromEvent(e);});
volTrack.addEventListener("touchstart",e=>{dragging=true;volFromEvent(e);},{passive:true});
document.addEventListener("mousemove",e=>{if(dragging)volFromEvent(e);});
document.addEventListener("touchmove",e=>{if(dragging)volFromEvent(e);},{passive:true});
document.addEventListener("mouseup",()=>dragging=false);
document.addEventListener("touchend",()=>dragging=false);

/* ══ КУРСОР ══ */
const cursor=document.getElementById("cursor");
let mx=0,my=0,cx=0,cy=0;
document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;});
(function cursorAnim(){
  cx+=(mx-cx)*0.18;cy+=(my-cy)*0.18;
  cursor.style.left=(cx-10)+"px";cursor.style.top=(cy-10)+"px";
  requestAnimationFrame(cursorAnim);
})();

/* ══ ФЛОАТИНГ ══ */
const phrases=["пусто","empty","null","void","idk"];
let pi=0;
setInterval(()=>{pi=(pi+1)%phrases.length;document.getElementById("floating").textContent=phrases[pi];},2500);

/* ══ ТАЙТЛ ══ */
const faces=["пиздуй","нахуй"];
let fi=0;
setInterval(()=>{
  fi=(fi+1)%faces.length;
  document.title=faces[fi];
  document.getElementById("title").textContent=faces[fi];
},2000);

/* ══ РЕСАЙЗ ══ */
window.onresize=()=>{
  canvas.width=innerWidth;canvas.height=innerHeight;
  offC.width=canvas.width;offC.height=canvas.height;
  spawnParticles();updateText(textList[tIdx]);setVolume(volume);
};
</script>
</body>
</html>
